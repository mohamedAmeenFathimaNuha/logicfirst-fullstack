<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>FD RATE CALCULATER</title>
</head>
<body>
    <div id="wrapper">
        <h2>FD RATE CALCULATER</h2>
        <div class="inputdiv">
            <input type="text" id="input" placeholder="tenure months">
        </div>
        <div>
            <button type="submit" onclick='fdRate()'>Calculate</button>
        </div>
        <div id="result">

        </div>
    </div>
    <script>
       function fdRate(){
          // console.log(documnet.getElemntById("input").val)
          // so chnsge val into value
          const months=Number(document.getElementById("input").value)
          // don.t put rate in const
          let rate=0

          /* < 3 months : 5.8%
             3-6 months : 6.5%
             7-9 months : 6.8%
             >=10 months: 7%
         */

         //else if ladder
         
        if(months<3)
          rate=5.8
        else if(months>=3 && months<=6)
          rate=6.5
        else if(months>=6 && months<=9)
          rate=6.8
        else
          rate=7

          //display the value so..
          //select the id related display
        //result=document.getElemntById("result")

        // check months correct print or not
         // console.log(months)
        let result=document.querySelector('#result')
        
       

        if (months > 0)
                result.innerHTML = "Your interest rate is " + rate + "%";
            else
                result.innerHTML = "Please enter a valid number of months.";
        
      }
       </script>
</body>
</html>
