<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>EB BILL CALCULATER</title>
</head>
<body>
    <div id="wrapper">
        <h2>EB BILL CALCULATER</h2>
        <div class="inputdiv">
            <input type="text" id="input" placeholder="tenure bill...">
        </div>
        <div>
            <button type="submit" onclick='erCal()'>Calculate</button>
        </div>
        <div id="result">
        </div>
    </div>
    <script>
       function erCal(){
          console.log(document.getElementById("input").value);
          const input =Number(document.getElementById("input").value);
          let output=0;
          if(input<50){
                  output=input*0.75;
          }
          else if(input<100 && input>=50){
                  output=(input-50)*1+50*0.75;
          }
          else if(input<200 && input>=100){
                  output=(input-150)*1.3 + 100*1 + 50*.75;
          }
          else(input>=250){
                  output=(input-250)*1.5 + 100*1.3 + 100*1 + 50*.75
          }
            let result=document.querySelector('#result');
            result.innerHTML="Your er bill is " +output +"units"
       }
    </script>
    </body>
    </html>
